name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rust:
    name: ${{ matrix.os }} / rust-event-loop-smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.83.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --workspace -- --nocapture

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
